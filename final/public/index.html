<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link href="index/index.css" rel="stylesheet" />
    </head>
    <body>
        <main>
            <section>
                <form
                    method="POST"
                    action="/new-session"
                    enctype="multipart/form-data"
                >
                    <input type="file" name="snippets" multiple="multiple" />
                    <input type="submit" value="New Session" />
                </form>
            </section>
            <section>
                <form method="POST" action="/retrieve-session">
                    <p>Join a remote session</p>
                    <input
                        type="number"
                        name="pin"
                        placeholder="Enter PIN"
                        required
                    />
                    <input type="submit" value="Join" />
                </form>
            </section>
        </main>
        <script src="index/index.js"></script>
    </body>
</html>
