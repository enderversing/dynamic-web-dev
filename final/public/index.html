<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            body {
                display: grid;
                grid-template-columns: 1fr;
                grid-template-rows: 100vh;
                align-items: center;
                justify-items: center;
            }
            main {
                display: flex;
                flex-direction: row;
                gap: 1rem;
                border: 0.0725rem black solid;
                border-radius: 0.5rem;
                padding: 1rem;
            }

            main > section {
                text-align: center;
                border: 0.0725rem black dashed;
                border-radius: 0.5rem;
                padding: 1rem;
            }
        </style>
    </head>
    <body>
        <main>
            <section>
                <form
                    method="POST"
                    action="/new-session"
                    enctype="multipart/form-data"
                >
                    <input type="submit" value="New Session" />
                </form>
            </section>
            <section>
                <form
                    method="POST"
                    action="/retrieve-session"
                    enctype="multipart/form-data"
                >
                    <p>Join a remote session</p>
                    <input
                        type="number"
                        name="pin"
                        placeholder="Enter PIN"
                        required
                    />
                    <input type="submit" value="Join" />
                </form>
            </section>
        </main>
    </body>
</html>
